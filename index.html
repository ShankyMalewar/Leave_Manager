<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leave Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface2: #f8f7f3;
  --border: #e6e2d8;
  --border2: #d0ccc0;
  --text: #1c1c18;
  --text2: #58574f;
  --text3: #928f83;
  --green: #1a4d35;
  --green-mid: #2e7d55;
  --green-light: #e4f2ea;
  --green-glow: #d0edda;
  --amber: #9c6010;
  --amber-light: #fef0d8;
  --red: #9b2828;
  --red-light: #fdeaea;
  --red-mid: #d94444;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 5px;
  --header-h: 64px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  background: var(--green);
  height: var(--header-h);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  color: #fff;
  text-decoration: none;
}
.logo-icon {
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  transition: background 0.15s;
}
.logo-text {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: #fff;
}
.logo-dot {
  width: 6px;
  height: 6px;
  background: #6ee8a8;
  border-radius: 50%;
  display: inline-block;
  margin-left: 3px;
  margin-bottom: 2px;
  vertical-align: middle;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── BUTTONS ── */
.btn {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: var(--radius-xs);
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.btn:hover { background: var(--surface2); border-color: var(--text3); }
.btn:active { transform: scale(0.98); }

.btn-header {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.9);
}
.btn-header:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.35); color: #fff; }

.btn-primary { background: var(--green); color: #fff; border-color: var(--green); }
.btn-primary:hover { background: #163f2b; border-color: #163f2b; }

.btn-header-primary {
  background: #fff;
  color: var(--green);
  border-color: #fff;
  font-weight: 600;
}
.btn-header-primary:hover { background: #f0f9f4; }

.btn-danger { color: var(--red); border-color: #e8b8b8; background: var(--red-light); }
.btn-danger:hover { background: #f7c8c8; }

.btn-sm { font-size: 12px; padding: 5px 10px; border-radius: 5px; }
.btn:disabled { opacity: 0.38; cursor: not-allowed; pointer-events: none; }

/* ── MAIN LAYOUT ── */
main { max-width: 1060px; margin: 0 auto; padding: 2rem; }

/* ── STATS ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 2rem;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.1rem 1.35rem;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
}
.stat-card.c-default::before { background: var(--border2); }
.stat-card.c-green::before { background: var(--green-mid); }
.stat-card.c-amber::before { background: #d48a1a; }
.stat-card.c-red::before { background: var(--red-mid); }
.stat-label {
  font-size: 11.5px;
  color: var(--text3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 8px;
}
.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -1.5px;
  color: var(--text);
  line-height: 1;
}
.stat-value.green { color: var(--green-mid); }
.stat-value.amber { color: var(--amber); }
.stat-value.red { color: var(--red-mid); }

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px; }
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 14px;
  pointer-events: none;
}
.search-input {
  font-family: 'Outfit', sans-serif;
  font-size: 13.5px;
  width: 100%;
  padding: 9px 12px 9px 34px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
  box-shadow: var(--shadow);
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(46,125,85,0.1); }

.filter-select {
  font-family: 'Outfit', sans-serif;
  font-size: 13.5px;
  padding: 9px 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  outline: none;
  box-shadow: var(--shadow);
}
.filter-select:focus { border-color: var(--green-mid); }

/* ── TABLE ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left;
  padding: 11px 16px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text3);
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #faf9f5; }
tbody td { padding: 11px 16px; vertical-align: middle; font-size: 13.5px; color: var(--text); }

.emp-name { font-weight: 500; display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
}

.leave-bar-wrap { display: flex; align-items: center; gap: 10px; }
.leave-bar { width: 88px; height: 5px; background: var(--bg); border-radius: 99px; overflow: hidden; flex-shrink: 0; }
.leave-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
.leave-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  min-width: 54px;
}

.badge {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 99px;
  letter-spacing: 0.2px;
}
.badge-full { background: var(--green-light); color: var(--green); }
.badge-mid { background: var(--amber-light); color: var(--amber); }
.badge-low { background: var(--red-light); color: var(--red); }
.badge-out { background: #f0ede6; color: var(--text3); }
.badge-half { background: #fff8e1; color: #7a5200; }

.actions-cell { display: flex; gap: 6px; align-items: center; }
.no-results { text-align: center; padding: 3.5rem 1rem; color: var(--text3); font-size: 14px; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(20,20,16,0.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface);
  border-radius: var(--radius);
  width: 440px;
  max-width: 95vw;
  max-height: 92vh;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  animation: slideUp 0.2s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
@keyframes slideUp {
  from { transform: translateY(12px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 1.4rem 1.85rem 1rem;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}

.modal-body {
  overflow-y: auto;
  padding: 1.25rem 1.85rem;
  flex: 1;
}

.modal-footer {
  padding: 1rem 1.85rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  flex-shrink: 0;
  background: var(--surface);
}
.modal-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}
.modal-close {
  width: 28px; height: 28px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3);
  font-size: 16px;
  transition: all 0.15s;
  flex-shrink: 0;
}
.modal-close:hover { background: var(--surface2); color: var(--text); }

.form-group { margin-bottom: 1.1rem; }
.form-label {
  font-size: 11.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text3);
  display: block;
  margin-bottom: 7px;
}
.form-input {
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.form-input:focus { border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(46,125,85,0.1); }

textarea.form-input {
  resize: vertical;
  min-height: 72px;
  line-height: 1.5;
}

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }
/* Alias for modal-footer */
.modal-footer { padding: 1rem 1.85rem; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; background: var(--surface); }

.deduct-info-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 1.25rem;
  font-size: 13.5px;
  color: var(--text2);
}
.deduct-info-box strong { color: var(--text); }

.leave-type-toggle { display: flex; gap: 8px; }
.toggle-btn {
  flex: 1;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--surface);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text2);
  transition: all 0.15s;
  text-align: center;
}
.toggle-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
.toggle-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.deduct-note-text { font-size: 12px; color: var(--text3); margin-top: 10px; }

/* ── CALENDAR ── */
.cal-wrap {
  margin-top: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--surface2);
}
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.cal-nav {
  width: 28px; height: 28px;
  border: 1px solid var(--border2);
  border-radius: 5px;
  background: var(--surface);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: var(--text2);
  transition: background 0.1s;
}
.cal-nav:hover { background: var(--surface2); }
.cal-month-label { font-size: 13px; font-weight: 600; color: var(--text); font-family: 'JetBrains Mono', monospace; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; padding: 7px; }
.cal-dow {
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--text3);
  padding: 3px 0;
}
.cal-day {
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  border-radius: 5px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.1s;
  color: var(--text);
  font-weight: 400;
}
.cal-day:hover:not(.cal-empty):not(.cal-disabled) { background: var(--green-light); border-color: var(--green-mid); color: var(--green); }
.cal-day.cal-selected { background: var(--green); color: #fff; border-color: var(--green); font-weight: 600; }
.cal-day.cal-today { border-color: var(--green-mid); color: var(--green); font-weight: 600; }
.cal-day.cal-today.cal-selected { background: var(--green); color: #fff; }
.cal-day.cal-empty, .cal-day.cal-disabled { pointer-events: none; opacity: 0.22; }
.cal-selected-dates {
  padding: 8px 12px 10px;
  font-size: 12px;
  color: var(--text2);
  border-top: 1px solid var(--border);
  background: var(--surface);
  min-height: 34px;
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
}
.cal-date-chip {
  background: var(--green-light);
  color: var(--green);
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: border-color 0.1s;
}
.cal-date-chip:hover { border-color: var(--green-mid); }
.cal-placeholder { color: var(--text3); font-style: italic; font-size: 12px; }

/* ── HISTORY MODAL ── */
.modal-lg { width: 560px; }
.history-meta { font-size: 13px; color: var(--text2); margin-bottom: 1rem; flex-shrink: 0; line-height: 1.6; }
.history-meta strong { color: var(--text); }
.history-list { border: 1px solid var(--border); border-radius: var(--radius-sm); }
.history-empty { padding: 2.5rem 1rem; text-align: center; color: var(--text3); font-size: 13px; }
.history-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
}
.history-row:last-child { border-bottom: none; }
.history-row:nth-child(even) { background: var(--surface2); }
.h-num { color: var(--text3); font-size: 11px; min-width: 18px; padding-top: 1px; }
.h-body { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.h-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.h-date { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); }
.h-type { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; flex-shrink: 0; }
.h-type-full { background: var(--green-light); color: var(--green); }
.h-type-half { background: var(--amber-light); color: var(--amber); }
.h-recorded { font-size: 11px; color: var(--text3); margin-left: auto; white-space: nowrap; }
.h-note {
  font-size: 12px;
  color: var(--text2);
  background: var(--surface2);
  border-left: 2px solid var(--border2);
  padding: 3px 8px;
  border-radius: 0 4px 4px 0;
  margin-top: 2px;
  line-height: 1.5;
  font-style: italic;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  font-size: 13.5px;
  font-family: 'Outfit', sans-serif;
  padding: 11px 18px;
  border-radius: var(--radius-sm);
  z-index: 999;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  max-width: 340px;
  background: var(--text);
  color: #fff;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }

/* ── PAGINATION ── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text3);
}
.page-btns { display: flex; gap: 4px; }
.page-btn {
  width: 28px; height: 28px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 12px;
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.page-btn:hover { background: var(--surface2); }
.page-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
.page-btn:disabled { opacity: 0.35; cursor: default; }

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}
.section-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
}
.section-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }

/* ── RESPONSIVE ── */
@media (max-width: 720px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  main { padding: 1rem; }
  header { padding: 0 1rem; }
  .logo-text { display: none; }
  .btn-label { display: none; }
}
@media (max-width: 480px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📋</div>
    <span class="logo-text">Leave Manager<span class="logo-dot"></span></span>
  </div>
  <div class="header-actions">
    <button class="btn btn-header" onclick="importFromExcel()" title="Load data from Excel backup">
      📂 <span class="btn-label">Import</span>
    </button>
    <button class="btn btn-header" onclick="exportToExcel()" title="Export all data to Excel">
      ⬇ <span class="btn-label">Export</span>
    </button>
    <button class="btn btn-header" onclick="resetAll()" title="Reset all leave balances">
      ↺ <span class="btn-label">Reset All</span>
    </button>
    <button class="btn btn-header-primary" onclick="openAddModal()">+ Add Employee</button>
  </div>
</header>

<input type="file" id="excelFileInput" accept=".xlsx" style="display:none" onchange="handleExcelFile(event)" />

<main>
  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card c-default">
      <div class="stat-label">Total Employees</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-card c-green">
      <div class="stat-label">Full Balance</div>
      <div class="stat-value green" id="stat-full">0</div>
    </div>
    <div class="stat-card c-amber">
      <div class="stat-label">Low Balance</div>
      <div class="stat-value amber" id="stat-low">0</div>
    </div>

<div class="modal-overlay" id="deductModal">

      <div class="deduct-note-text" id="deductCalcNote"></div>

    <div class="modal-footer">
      <button class="btn" onclick="closeModal('deductModal')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmDeduct()">Confirm Deduct</button>

<!-- ── HISTORY MODAL ── -->
<div class="modal-overlay" id="historyModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title">Leave History</div>
      <button class="modal-close" onclick="closeModal('historyModal')">✕</button>

      <div class="history-meta" id="historyMeta"></div>
      <div class="history-list" id="historyList"></div>

      <button class="btn" onclick="closeModal('historyModal')">Close</button>
    </div>

<div class="toast" id="toast"></div>

<script>
const MAX_LEAVES = 8;
const PAGE_SIZE = 20;

let employees = [];
let filtered = [];
let currentPage = 1;
let activeDeductId = null;
let leaveType = 'full';

let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth();
let calSelectedDates = [];

const AVATAR_COLORS = [
  ['#e4f2ea','#1a4d35'],['#deeaf8','#134a8a'],['#fef0d8','#7a4b0d'],
  ['#fbeaf0','#88274a'],['#eaf4de','#305a0e'],['#fdeaea','#8a2020'],
  ['#eeecfe','#44399e'],['#fceee8','#833214']
];

function colorFor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function fmt(n) {
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}

function load() {
  const raw = localStorage.getItem('lm_v4');
  if (raw) { employees = JSON.parse(raw); }
  else { employees = generateSample(); save(); }
}

function save() {
  localStorage.setItem('lm_v4', JSON.stringify(employees));
}

function generateSample() {
  const names = [
    'Aarav Sharma','Vivaan Patel','Aditya Singh','Vihaan Gupta','Arjun Kumar',
    'Sai Mehta','Reyansh Joshi','Ayaan Reddy','Dhruv Nair','Kabir Verma',
    'Priya Desai','Ananya Iyer','Divya Pillai','Sneha Rao','Pooja Choudhary',
    'Riya Bhat','Kavya Murthy','Ishita Pandey','Meera Saxena','Shreya Chauhan',
    'Rohan Malhotra','Arnav Kapoor','Shivam Agarwal','Tushar Bajaj','Nikhil Bose',
    'Harsh Sinha','Yash Tiwari','Aman Dubey','Karan Goel','Mohit Sethi',
    'Deepak Yadav','Ankit Rastogi','Vishal Bhatt','Rahul Jain','Rajesh Mishra',
    'Sunita Tyagi','Anjali Bansal','Rekha Goyal','Deepa Trivedi','Lata Varma',
    'Vinod Ghosh','Suresh Kulkarni','Manoj Prasad','Ramesh Hegde','Arun Shetty',
    'Neha Sharma','Swati Patel','Usha Singh','Geeta Gupta','Sarita Kumar',
    'Ashok Mehta','Vijay Joshi','Pramod Reddy','Sunil Nair','Girish Verma',
    'Anil Desai','Ravi Iyer','Mohan Pillai','Santosh Rao','Krishna Choudhary',
    'Pawan Bhat','Dilip Murthy','Mahesh Pandey','Naresh Saxena','Rakesh Chauhan',
    'Sanjay Malhotra','Dinesh Kapoor','Hemant Agarwal','Kamlesh Bajaj','Lalit Bose',
    'Mukesh Sinha','Naveen Tiwari','Om Dubey','Prem Goel','Rajeev Sethi',
    'Sachin Yadav','Tarun Rastogi','Uday Bhatt','Vaibhav Jain','Waqar Mishra',
    'Zara Tyagi','Yashvi Bansal','Tanvi Trivedi','Sonal Varma','Ritika Ghosh',
    'Preeti Kulkarni','Pallavi Prasad','Nidhi Hegde','Mansi Shetty','Lalita Sharma',
    'Kamini Patel','Jayanti Singh','Indu Gupta','Heena Kumar','Gaurav Mehta',
    'Farhan Joshi','Ekta Reddy','Dimple Nair','Chetan Verma','Bhavna Shah'
  ];
  return names.map((name, i) => ({ id: i + 1, name, leaves: MAX_LEAVES, history: [] }));
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;

  filtered = employees.filter(e => {
    const matchQ = !q || e.name.toLowerCase().includes(q);
    let matchStatus = true;
    if (status === 'full') matchStatus = e.leaves === MAX_LEAVES;
    else if (status === 'mid') matchStatus = e.leaves >= 3 && e.leaves < MAX_LEAVES;
    else if (status === 'low') matchStatus = e.leaves > 0 && e.leaves < 3;
    else if (status === 'out') matchStatus = e.leaves === 0;
    return matchQ && matchStatus;
  });

  currentPage = 1;
  renderTable();
  renderStats();

  const hint = document.getElementById('filterHint');
  const statusLabels = { all: 'All employees', full: 'Full balance', mid: 'Partial balance', low: 'Low balance', out: 'Exhausted' };
  hint.textContent = (q ? `"${q}" · ` : '') + (statusLabels[status] || '') + ` · ${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;
}

function renderStats() {
  document.getElementById('stat-total').textContent = employees.length;
  document.getElementById('stat-full').textContent = employees.filter(e => e.leaves === MAX_LEAVES).length;
  document.getElementById('stat-low').textContent = employees.filter(e => e.leaves > 0 && e.leaves < 3).length;
  document.getElementById('stat-out').textContent = employees.filter(e => e.leaves === 0).length;
}

function badgeHtml(leaves) {
  if (leaves === MAX_LEAVES) return `<span class="badge badge-full">Full</span>`;
  if (leaves >= 3) return `<span class="badge badge-mid">Partial</span>`;
  if (leaves === 0.5) return `<span class="badge badge-half">½ day left</span>`;
  if (leaves > 0) return `<span class="badge badge-low">Low</span>`;
  return `<span class="badge badge-out">Exhausted</span>`;
}

function barColor(leaves) {
  const pct = leaves / MAX_LEAVES;
  if (pct >= 0.75) return '#2e7d55';
  if (pct >= 0.375) return '#d48a1a';
  if (pct > 0) return '#d94444';
  return '#c8c5ba';
}

function renderTable() {
  const tbody = document.getElementById('empTable');
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  if (page.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="no-results">No employees match your filters.</div></td></tr>`;
  } else {
    tbody.innerHTML = page.map((e, i) => {
      const [bg, fg] = colorFor(e.name);
      const pct = (e.leaves / MAX_LEAVES) * 100;
      const fill = barColor(e.leaves);
      return `<tr>
        <td style="color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:11px;">${start+i+1}</td>
        <td>
          <div class="emp-name">
            <div class="avatar" style="background:${bg};color:${fg}">${initials(e.name)}</div>
            ${e.name}
          </div>
        </td>
        <td>
          <div class="leave-bar-wrap">
            <div class="leave-bar"><div class="leave-bar-fill" style="width:${pct}%;background:${fill}"></div></div>
            <span class="leave-count" style="color:${fill}">${fmt(e.leaves)} / ${MAX_LEAVES}</span>
          </div>
        </td>
        <td>${badgeHtml(e.leaves)}</td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-sm btn-danger" onclick="openDeductModal(${e.id})" ${e.leaves===0?'disabled':''}>− Deduct</button>
            <button class="btn btn-sm" onclick="openHistoryModal(${e.id})" title="View leave history" style="color:var(--green);">📅 History</button>
            <button class="btn btn-sm" onclick="deleteEmployee(${e.id})" style="color:var(--text3);" title="Remove employee">✕</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const bar = document.getElementById('paginationBar');
  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end = Math.min(currentPage * PAGE_SIZE, filtered.length);
  const showing = filtered.length ? `Showing ${start}–${end} of ${filtered.length}` : 'No results';

  let pages = '';
  for (let p = 1; p <= totalPages; p++) {
    if (totalPages > 7 && p > 2 && p < totalPages - 1 && Math.abs(p - currentPage) > 1) {
      if (p === 3 || p === totalPages - 2) pages += `<span style="padding:0 4px;color:var(--text3)">…</span>`;
      continue;
    }
    pages += `<button class="page-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  }

  bar.innerHTML = `
    <span>${showing}</span>
    <div class="page-btns">
      <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>
      ${pages}
      <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>
    </div>`;
}

function goPage(p) {
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
}

/* ── DEDUCT MODAL ── */
function openDeductModal(id) {
  const e = employees.find(x => x.id === id);
  if (!e) return;
  activeDeductId = id;
  leaveType = 'full';
  calSelectedDates = [];
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();

  document.getElementById('deductInfo').innerHTML =
    `<strong>${e.name}</strong><br>Current balance: <strong style="color:var(--green-mid)">${fmt(e.leaves)} / ${MAX_LEAVES}</strong> leaves remaining`;
  document.getElementById('toggleFull').classList.add('active');
  document.getElementById('toggleHalf').classList.remove('active');
  document.getElementById('toggleHalf').disabled = e.leaves < 0.5;
  document.getElementById('deductNote').value = '';
  document.getElementById('deductCalcNote').textContent = '';
  renderCalendar();
  refreshDeductNote();
  document.getElementById('deductModal').classList.add('open');
}

function refreshDeductNote() {
  const e = employees.find(x => x.id === activeDeductId);
  if (!e) return;
  const amt = leaveType === 'half' ? 0.5 : calSelectedDates.length;
  const after = Math.round((e.leaves - amt) * 10) / 10;
  const noteEl = document.getElementById('deductCalcNote');
  if (amt === 0) {
    noteEl.textContent = 'Select at least one date to continue.';
    noteEl.style.color = 'var(--amber)';
  } else if (after < 0) {
    noteEl.textContent = `Not enough leaves — only ${fmt(e.leaves)} available.`;
    noteEl.style.color = 'var(--red)';
  } else {
    noteEl.textContent = `After deduction: ${fmt(after)} leaves remaining.`;
    noteEl.style.color = 'var(--text3)';
  }
}

function setLeaveType(type) {
  leaveType = type;
  document.getElementById('toggleFull').classList.toggle('active', type === 'full');
  document.getElementById('toggleHalf').classList.toggle('active', type === 'half');
  if (type === 'half' && calSelectedDates.length > 1) {
    calSelectedDates = [calSelectedDates[0]];
    renderCalendar();
  }
  refreshDeductNote();
}

function confirmDeduct() {
  const e = employees.find(x => x.id === activeDeductId);
  if (!e) return;
  const amt = leaveType === 'half' ? 0.5 : calSelectedDates.length;
  if (amt === 0) { showToast('Please select at least one date on the calendar.', 'error'); return; }
  if (e.leaves < amt) { showToast('Not enough leaves remaining.', 'error'); return; }

  const note = document.getElementById('deductNote').value.trim();
  e.leaves = Math.round((e.leaves - amt) * 10) / 10;

  if (!e.history) e.history = [];
  const recordedAt = new Date().toISOString();
  if (leaveType === 'half') {
    e.history.push({ date: calSelectedDates[0], type: 'half', note, recordedAt });
  } else {
    calSelectedDates.forEach(date => e.history.push({ date, type: 'full', note, recordedAt }));
  }
  e.history.sort((a, b) => b.date.localeCompare(a.date));

  save();
  closeModal('deductModal');
  applyFilters();

  const label = leaveType === 'half'
    ? `½ day (${fmtDate(calSelectedDates[0])})`
    : calSelectedDates.length === 1 ? fmtDate(calSelectedDates[0]) : `${calSelectedDates.length} days`;
  showToast(`${label} deducted for ${e.name}. ${fmt(e.leaves)} left.`, 'success');
}

/* ── ADD / DELETE ── */
function openAddModal() {
  document.getElementById('addName').value = '';
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('addName').focus(), 60);
}

function addEmployee() {
  const name = document.getElementById('addName').value.trim();
  if (!name) { showToast('Please enter a name.', 'error'); return; }
  const newId = employees.length ? Math.max(...employees.map(e => e.id)) + 1 : 1;
  employees.push({ id: newId, name, leaves: MAX_LEAVES, history: [] });
  save(); closeModal('addModal'); applyFilters();
  showToast(`${name} added with ${MAX_LEAVES} leaves.`, 'success');
}

function deleteEmployee(id) {
  const e = employees.find(x => x.id === id);
  if (!e || !confirm(`Remove ${e.name} from the list?`)) return;
  employees = employees.filter(x => x.id !== id);
  save(); applyFilters();
  showToast(`${e.name} removed.`);
}

function resetAll() {
  if (!confirm('Reset all employees to 8 leaves? This cannot be undone.')) return;
  employees.forEach(e => e.leaves = MAX_LEAVES);
  save(); applyFilters();
  showToast('All leave balances reset to 8.', 'success');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* ── HISTORY MODAL ── */
function openHistoryModal(id) {
  const e = employees.find(x => x.id === id);
  if (!e) return;
  const history = e.history || [];
  const used = MAX_LEAVES - e.leaves;

  document.getElementById('historyMeta').innerHTML =
    `<strong>${e.name}</strong> &nbsp;·&nbsp; ${fmt(e.leaves)} / ${MAX_LEAVES} leaves remaining &nbsp;·&nbsp; ${fmt(used)} used`;

  if (history.length === 0) {
    document.getElementById('historyList').innerHTML =
      `<div class="history-empty">No leave entries recorded yet.</div>`;
  } else {
    document.getElementById('historyList').innerHTML = history.map((h, i) => {
      const typeLabel = h.type === 'half' ? '½ Day' : 'Full Day';
      const typeCls   = h.type === 'half' ? 'h-type-half' : 'h-type-full';
      const recorded  = fmtRecordedAt(h.recordedAt);
      const noteHtml  = h.note
        ? `<div class="h-note">📝 ${escapeHtml(h.note)}</div>`
        : '';
      return `<div class="history-row">
        <span class="h-num">${i+1}</span>
        <div class="h-body">
          <div class="h-top">
            <span class="h-date">${fmtDate(h.date)}</span>
            <span class="h-type ${typeCls}">${typeLabel}</span>
            <span class="h-recorded">Recorded ${recorded}</span>
          </div>
          ${noteHtml}
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('historyModal').classList.add('open');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtRecordedAt(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
       + ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

/* ── TOAST ── */
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' '+type : '');
  setTimeout(() => t.classList.remove('show'), 3200);
}

/* ── CLOSE MODALS ON OVERLAY CLICK ── */
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', ev => { if (ev.target === el) el.classList.remove('open'); });
});

/* ── ENTER KEY FOR ADD MODAL ── */
document.addEventListener('keydown', ev => {
  if (ev.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(el => el.classList.remove('open'));
});

/* ── CALENDAR ── */
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];

function calKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function fmtDate(key) {
  const [y, m, d] = key.split('-');
  return `${parseInt(d)} ${MONTH_NAMES[parseInt(m)-1].slice(0,3)} ${y}`;
}

function calShift(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function calToggleDay(key) {
  const e = employees.find(x => x.id === activeDeductId);
  if (!e) return;
  const idx = calSelectedDates.indexOf(key);
  if (idx > -1) {
    calSelectedDates.splice(idx, 1);
  } else {
    if (leaveType === 'half') {
      calSelectedDates = [key];
    } else {
      if (calSelectedDates.length >= Math.floor(e.leaves)) {
        showToast(`Max selectable: ${Math.floor(e.leaves)} day(s) based on balance.`, 'error');
        return;
      }
      calSelectedDates.push(key);
      calSelectedDates.sort();
    }
  }
  renderCalendar();
  refreshDeductNote();
}

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
  const grid = document.getElementById('calGrid');
  const today = new Date();
  const todayKey = calKey(today.getFullYear(), today.getMonth(), today.getDate());
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day cal-empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const key = calKey(calYear, calMonth, d);
    const isSel = calSelectedDates.includes(key);
    const isToday = key === todayKey;
    let cls = 'cal-day';
    if (isSel) cls += ' cal-selected';
    if (isToday) cls += ' cal-today';
    html += `<div class="${cls}" onclick="calToggleDay('${key}')">${d}</div>`;
  }
  grid.innerHTML = html;

  const chips = document.getElementById('calChips');
  if (calSelectedDates.length === 0) {
    chips.innerHTML = `<span class="cal-placeholder">Click dates on the calendar to select</span>`;
  } else {
    chips.innerHTML = calSelectedDates.map(k =>
      `<span class="cal-date-chip" onclick="calToggleDay('${k}')">${fmtDate(k)} ✕</span>`
    ).join('');
  }
}

/* ── EXCEL EXPORT ── */
function exportToExcel() {
  const wb = XLSX.utils.book_new();

  // Sheet 1: Summary
  const summaryData = [['#','Employee Name','Leaves Remaining','Leaves Used','Status']];
  employees.forEach((e, i) => {
    const used = MAX_LEAVES - e.leaves;
    let status = 'Full';
    if (e.leaves === 0) status = 'Exhausted';
    else if (e.leaves < 3) status = 'Low';
    else if (e.leaves < MAX_LEAVES) status = 'Partial';
    summaryData.push([i+1, e.name, e.leaves, used, status]);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(summaryData);
  ws1['!cols'] = [{wch:4},{wch:26},{wch:18},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Employee Summary');

  // Sheet 2: Full History (with Notes)
  const historyData = [['Employee Name','Leave Date','Leave Type','Note / Reason','Recorded On']];
  employees.forEach(e => {
    const history = e.history || [];
    if (history.length === 0) {
      historyData.push([e.name,'—','—','—','—']);
    } else {
      history.forEach(h => {
        historyData.push([
          e.name,
          fmtDate(h.date),
          h.type === 'half' ? 'Half Day' : 'Full Day',
          h.note || '—',
          fmtRecordedAt(h.recordedAt)
        ]);
      });
    }
  });
  const ws2 = XLSX.utils.aoa_to_sheet(historyData);
  ws2['!cols'] = [{wch:26},{wch:16},{wch:12},{wch:32},{wch:22}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Leave History');

  // Sheet 3: Raw backup
  const raw = JSON.stringify(employees);
  const ws3 = XLSX.utils.aoa_to_sheet([['backup_json'],[raw]]);
  ws3['!cols'] = [{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws3, '_backup');

  const today = new Date();
  const tag = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb, `LeaveManager_${tag}.xlsx`);
  showToast('Excel exported successfully!', 'success');
}

/* ── EXCEL IMPORT ── */
function importFromExcel() {
  document.getElementById('excelFileInput').click();
}

function handleExcelFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary' });
      const ws = wb.Sheets['_backup'];
      if (!ws) { showToast('Invalid file — no backup data found.', 'error'); return; }
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      const jsonStr = rows[1] && rows[1][0];
      if (!jsonStr) { showToast('Backup data is empty.', 'error'); return; }
      const imported = JSON.parse(jsonStr);
      if (!Array.isArray(imported)) { showToast('Invalid backup format.', 'error'); return; }
      if (!confirm(`Import ${imported.length} employees from "${file.name}"? This will replace current data.`)) return;
      employees = imported;
      save(); applyFilters();
      showToast(`${imported.length} employees loaded from Excel.`, 'success');
    } catch(err) {
      showToast('Could not read file. Make sure it was exported from Leave Manager.', 'error');
    }
    event.target.value = '';
  };
  reader.readAsBinaryString(file);
}

/* ── INIT ── */
load();
applyFilters();
</script>
